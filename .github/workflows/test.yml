name: Test

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Sync dependencies
      run: uv sync
    - name: Run tests
      run: uv run python -m pytest tests/ -v
